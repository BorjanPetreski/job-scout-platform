# Template: ML Engineer (classical/production ML). No salary numbers (D20).
schema_version: 1
template_id: ai-ml/ml-engineer
label: "Machine Learning Engineer"
suggest_also: [ai-ml/ai-engineer, ai-ml/mlops, data/data-engineer]

defaults:
  search:
    stream: ai-ml
    subvariant: ml-engineer
    work_model: [remote]
    keywords:
      core:
        - machine learning engineer
        - ml engineer
        - applied scientist
        - ml ops engineer
        - mlops engineer
      expanded:
        - ai engineer
        - research engineer
        - data scientist
        - computer vision engineer
        - nlp engineer
        - deep learning engineer
    archetypes: [ML Engineer, Applied Scientist, MLOps, Research-leaning, Data-leaning]

  hard_filters:
    travel: none
    clearance: drop
    grind_culture: drop
    tool_lockin_drop: []
    role_exclusion_terms: [pure data analyst, bi only]
    closed_location_list: drop_if_absent

  scoring:
    surface_threshold: 7.0

  platforms:
    linkedin_tripwire:
      enabled: true
      keywords: [Machine Learning Engineer, ML Engineer, Applied Scientist]
    rejected: []

platform_tiers:
  1: [justjoin-it, lever, workable, greenhouse, himalayas, remotive]
  2: [remote-rocketship-worldwide, nodesk, wwr, arc]
  3: [jobgether, dynamite, working-nomads, wttj, landing-jobs, remote-ok, deel, crossover]

seniority_titles:
  ml engineer i: junior
  ml engineer ii: mid
  senior ml engineer: senior
  staff ml engineer: staff
  applied scientist: senior
  ml lead: lead

scoring_bands: |
  Score 1.0-10.0, one decimal. Surface only >= threshold.
  - 9.0-10.0 — Production ML (training + serving, feature/pipeline ownership, evals, MLOps),
    strong SWE + ML fundamentals; globally open; salary confirmed above the floor.
  - 8.0-8.9 — Strong ML engineering role, one minor gap OK; globally open; salary likely clears.
    Research adjacency fine unless the role is research-only with no shipping.
  - 7.0-7.9 — ML-adjacent (data-science-leaning or MLOps-leaning); salary unconfirmed; minor flag.
  - Below threshold — drop silently (log the real reason).
  Archetype tag BEFORE scoring: ML Engineer · Applied Scientist · MLOps · Research-leaning ·
  Data-leaning.

salary_estimation_heuristics: |
  ML engineering pays a premium band vs generic SWE. US/UK/Bay-adjacent paying globally -> likely
  clears comfortably; AI-native startup -> competitive, note equity split. Seniority + shipped
  models -> higher band. Unpublished salary is NEVER an auto-drop (D20).

interview:
  emphasize: [search.subvariant, search.target_seniority, compensation.floor, candidate.location, work_model]
  skip_if_defaulted: [hard_filters.grind_culture, hard_filters.clearance, sweep]
