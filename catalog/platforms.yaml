# LinkedIn is NOT a platform entry: it is a discovery tripwire only
# (core/linkedin_tripwire.py). No login, no cookies, guest endpoint only.
# Keywords/locations come from the profile; caps and endpoint discipline are engine law.
linkedin_tripwire:
  remote_filter: "f_WT=2"
  freshness: "f_TPR=r86400"
