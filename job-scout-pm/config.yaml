# LinkedIn is NOT a platform entry: it is a discovery tripwire only (scripts/linkedin_tripwire.py).
# No login, no cookies, guest endpoint only. Auth-walled JDs -> "login-walled — open manually".
linkedin_tripwire:
  enabled: true
  keywords: ["Project Manager", "Delivery Manager", "Scrum Master"]
  locations: ["European Union", "Worldwide"]   # Borjan may add "North Macedonia" (spec §10 q4)
  remote_filter: "f_WT=2"
  freshness: "f_TPR=r86400"

