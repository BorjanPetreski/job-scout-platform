keywords:
  # With full enumeration (delta row 3) these are LOCAL TITLE-MATCH FILTERS, not search queries.
  # Candidates record the title variant ON THE POSTING, not the keyword that matched (promote/demote data).
  # TODO(v2.10.0 port): reconcile against the 2.10.0 core+expanded sets on upload.
  core:
    - project manager
    - it project manager
    - technical project manager
    - delivery manager
    - service delivery manager
    - client delivery manager
    - scrum master
    - product owner
  expanded:
    - program manager
    - engagement manager
    - implementation manager
    - agile coach
    - delivery lead
    - project lead
    - agile project manager
    - digital project manager

hard_filters:
  # MACHINE FIRST-PASS ONLY. Regexes flag/drop the mechanical cases; Claude still does the
  # judgment-layer read on every shortlist candidate (Spiralyze buried-hours lesson: scripts
  # flag, Claude decides). Filters 11 (location-fluid copy) and 12 (LATAM payroll) plus the
  # Cyclad EU-citizenship nuance are judgment-layer — listed here as flag-only patterns.
  salary_floor:
    eur_net_month: 2500
    eur_gross_month: 3000
    usd_year: 35000
  auto_drop_patterns:      # confident drops — logged "Filtered Out" with matched pattern
    us_only: '(?i)\b(US[- ]only|United States only|must (be located|reside) in the (US|United States)|authorized to work in the (US|U\.S\.)|W-?2\b)'
    clearance: '(?i)\b(security clearance|TS/SCI|secret clearance|public trust)\b'
    travel: '(?i)\b(travel (up to |approximately |~)?\d{1,3}\s?%|\d{1,3}\s?% travel)\b'
    grind_culture: '(?i)\b(996|70[- ]hour|60\+? ?hours?/?week|work hard,? play hard|hustle culture)\b'
  flag_patterns:           # NOT auto-drops — surfaced to the judgment layer with a flag
    timezone: '(?i)\b(EST|EDT|PST|PDT|CST|CDT|MST|Eastern Time|Pacific Time|Mountain Time|Central Time|[0-9]{1,2}\s?(am|pm)\s?(ET|EST|PT|PST|CT|CST|MT))\b'
    eu_citizenship: '(?i)\b(EU (citizenship|citizen|passport)|European Union citizenship|EU work permit required)\b'
    tool_lockin: '(?i)\b(certified (salesforce|servicenow|sap|workday|netsuite)|(salesforce|servicenow|sap|workday|netsuite) (administrator|certification required))\b'
    latam_payroll: '(?i)\b(LATAM|Latin America)\b.{0,80}\b(payroll|contract|entity|salary in local currency)\b'
    pure_ba: '(?i)\bbusiness analyst\b'
  eu_country_list_detector:
    # 2.10.0 filter #13: a CLOSED country list under a "Europe/EMEA remote" label that does not
    # name North Macedonia/Skopje = hard drop, no further verification.
    # Trigger: >=4 country names from the list below in one location block, no open-ended marker,
    # no North Macedonia mention. Distinct from location-fluid copy and country clones.
    countries: [Austria, Belgium, Bulgaria, Croatia, Cyprus, Czech, Denmark, Estonia, Finland,
                France, Germany, Greece, Hungary, Ireland, Italy, Latvia, Lithuania, Luxembourg,
                Malta, Netherlands, Poland, Portugal, Romania, Slovakia, Slovenia, Spain, Sweden,
                Norway, Switzerland, Iceland, UK, "United Kingdom"]
    open_ended_markers: ["and more", "worldwide", "among others", "not limited to", "etc"]
    must_include: ["North Macedonia", "Macedonia", "Skopje"]

caps:
  linkedin_requests_per_run: 10
  linkedin_min_delay_s: 3
  max_full_reads_per_run: 60     # local parses, not context tokens; cap is politeness only
                                 # (first post-migration runs carry a backlog; steady-state delta is small)
  link_check_parallelism: 8
  min_delay_same_host_s: 1
  headless_parallelism: 3

scan:
  full_rotation_default: true    # r2: AM/PM half-split retired (token-cost workaround, obsolete)
  freshness_window_h: 48         # where a platform supports date scoping
  full_sweep_dow: "Mon"          # weekly unscoped sweep
  timeout_s: 25

