name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # `validate-legacy` (name: "Validate job-scout-pm") was retired 2026-07-14, after
  # main's ruleset swapped its required check to "Validate platform (…)". job-scout-pm/
  # is a frozen v3 archive (see job-scout-pm/README.md) and is no longer audited in CI.
  validate-platform:
    name: Validate platform (core + catalog + templates + profiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Platform validation (compilation, catalog, templates, profiles, state, skills)
        run: python3 core/validate.py

      # Behavioral gate (complements the structural validation above): unit-tests the pure
      # detectors/dedup helpers + runs the acceptance sims (cross-boundary flows vs mocked
      # Notion). No network, no token — the sims mock the boundary. See tests/README.md.
      - name: Behavioral tests (detectors, dedup, sims)
        run: python3 tests/run_all.py

      # Parity (borjan-pm resolved config == legacy config.yaml) was the Phase-1
      # acceptance gate; it is retired at cutover (CUTOVER.md 5b). It now diverges BY
      # DESIGN: tiers are living per-profile data and the first post-cutover recompute
      # (2026-07-14: Greenhouse->T1, NoDesk + Remote Rocketship->T3) moved them off the
      # frozen legacy config. core/parity_diff.py is kept as the historical record.

      - name: Scan plans resolve for every profile (no network)
        run: |
          for p in profiles/*/; do
            id=$(basename "$p")
            echo "=== $id ==="
            python3 core/scan.py --profile "$id" --plan
          done
